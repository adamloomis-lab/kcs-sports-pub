<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KC's Sports Bar | Wadsworth, OH | Good Food. Good Times. Good Company.</title>
    <meta
      name="description"
      content="Wadsworth's neighborhood sports bar on Main Street. Cold drinks, scratch-kitchen bar food, breakfast all day, pool, darts and karaoke, open every day 10am to 2:30am. (330) 336-5100." />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="theme-color" content="#131313" />

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;700&family=Work+Sans:wght@400;500;600&display=swap"
      rel="stylesheet" />
    <!--SEO_HEAD-->
    <!-- Gate scroll-reveal styles on JS so no-JS / failed-bundle visitors see all content. -->
    <script>
      document.documentElement.classList.add('reveal-ready')
    </script>
  </head>
  <body>
    <!-- Hidden static form so Netlify detects it (and its fields) at build time.
         The live React form (src/pages/Contact.tsx) posts to this name. -->
    <form name="party-inquiry" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="tel" name="phone" />
      <input type="email" name="email" />
      <input type="text" name="date" />
      <input type="text" name="party-size" />
      <textarea name="message"></textarea>
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Simply Visible analytics --><script src="https://simplyvisible.online/track.js" defer></script>
</body>
</html>
